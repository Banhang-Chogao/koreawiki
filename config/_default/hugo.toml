baseURL = "https://banhang-chogao.github.io/koreawiki"
languageCode = "en"
title = "KoreaWiki — Korean Entertainment & Culture News"
theme = "koreawiki"
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 20
paginate = 12
copyright = "Copyright © {currentYear} KoreaWiki. All rights reserved."

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
    notAlternative = true

[params]
  description = "Your premium source for Korean entertainment, K-drama, K-pop, culture, and lifestyle news."
  author = "KoreaWiki Newsroom"
  keywords = ["Korean entertainment", "K-drama", "K-pop", "Korean news", "Korean culture", "Korea"]
  images = ["/images/og-default.png"]

  twitter = "@koreawiki"
  search = true
  darkMode = true
  comments = true
  relatedPosts = true
  readingTime = true
  toc = true
  accentColor = "#2563eb"

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    contentDir = "content/en"
    weight = 1
  [languages.ko]
    languageCode = "ko"
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 2
  [languages.vi]
    languageCode = "vi"
    languageName = "Tiếng Việt"
    contentDir = "content/vi"
    weight = 3

