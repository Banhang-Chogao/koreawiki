baseURL = "https://banhang-chogao.github.io/koreawiki/"
languageCode = "en"
title = "KoreaWiki — Korean Entertainment & Culture News"
theme = "koreawiki"
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 20
# Hugo ≤0.127 uses paginate; 0.128+ prefers [pagination].pagerSize
paginate = 12
copyright = "Copyright © {currentYear} KoreaWiki. All rights reserved."

[pagination]
  pagerSize = 12

# Private Translation Memory lives under data/glossary/ (json/md/csv/sqlite).
# Hugo's auto data loader only accepts json/yaml/toml/csv and would break on
# .md/.sqlite — mount data-hugo → data (not the default data/ folder).
# Glossary layout uses readFile("data/glossary/...") which reads from disk,
# independent of this mount.
dataDir = "data-hugo"

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data-hugo"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Your premium source for Korean entertainment, K-drama, K-pop, culture, and lifestyle news."
  author = "KoreaWiki Newsroom"
  keywords = ["Korean entertainment", "K-drama", "K-pop", "Korean news", "Korean culture", "Korea"]
  images = ["images/logo.svg"]

  twitter = "@koreawiki"
  search = true
  darkMode = false
  comments = true
  relatedPosts = true
  readingTime = true
  toc = true
  accentColor = "#2563eb"

# Default language English is served at site root (…/koreawiki/glossary/),
# not …/koreawiki/en/glossary/. Other languages keep /ko/ and /vi/ prefixes.
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    contentDir = "content/en"
    weight = 1
  [languages.ko]
    languageCode = "ko"
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 2
  [languages.vi]
    languageCode = "vi"
    languageName = "Tiếng Việt"
    contentDir = "content/vi"
    weight = 3

[[menu.main]]
