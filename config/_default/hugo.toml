baseURL = "https://banhang-chogao.github.io/koreawiki"
languageCode = "en"
title = "KoreaWiki — Korean Entertainment & Culture Hub"
theme = "koreawiki"
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 25
paginate = 12
copyright = "Copyright © {currentYear} KoreaWiki. All rights reserved."

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Your ultimate source for Korean entertainment — News, Culture, Travel, Food, KIẾN TRÚC."
  author = "KoreaWiki Team"
  contactEmail = "292648126+Banhang-Chogao@users.noreply.github.com"
  keywords = ["K-drama", "K-pop", "Korean entertainment", "Korea news", "Korean culture", "Hallyu", "dispatch"]
  images = ["/images/og-default.png"]

  twitter = "@koreawiki"

  seo = true
  schema = true
  opengraph = true
  twittercards = true
  breadcrumbs = true
  jsonfeed = true

  search = true
  darkMode = true
  comments = true
  relatedPosts = true
  readingTime = true
  toc = true
  newsletter = false

  accentColor = "#1a56db"

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
    title = "KoreaWiki — Korean Entertainment & Culture Hub"
    [languages.en.params]
description = "Your ultimate source for Korean entertainment — News, Culture, Travel, Food, KIẾN TRÚC."

  [languages.ko]
    languageCode = "ko"
    languageName = "한국어"
    weight = 2
    title = "KoreaWiki — 한국 연예 & 문화 허브"
    [languages.ko.params]
      description = "K-드라마, K-팝, 연예 뉴스, 문화, 라이프스타일 — 한국 콘텐츠의 모든 것."

  [languages.vi]
    languageCode = "vi"
    languageName = "Tiếng Việt"
    weight = 3
    title = "KoreaWiki — K-Lifestyle & Giải Trí Hàn Quốc"
    [languages.vi.params]
      description = "Tin tức giải trí Hàn Quốc — Văn hóa, Ẩm thực, Du lịch, Kiến trúc và tin tức hàng ngày."

[menu]
