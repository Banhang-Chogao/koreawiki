name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.126.0
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pyyaml Pillow

      - name: Self-heal — auto-fix long lines & slugs
        id: self-heal
        run: |
          python scripts/markdown_lint.py --fix
          python scripts/slug.py
          if ! git diff --quiet; then
            git config user.name "korea-wiki-self-heal[bot]"
            git config user.email "292648126+Banhang-Chogao@users.noreply.github.com"
            git add -A
            git commit -m "fix(self-heal): auto-fix markdown/slug issues"
            git push
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run QA
        if: steps.self-heal.outputs.fixed != 'true'
        run: |
          rc=0
          python scripts/qa.py || rc=1
          python scripts/seo.py || rc=1
          python scripts/frontmatter_check.py || rc=1
          python scripts/markdown_lint.py --fix || rc=1
          python scripts/slug.py --check || rc=1
          python scripts/check_links.py || rc=1
          exit $rc

      - name: Validate images
        if: steps.self-heal.outputs.fixed != 'true'
        run: python scripts/optimize_images.py

      - name: Generate WebP images
        if: steps.self-heal.outputs.fixed != 'true'
        run: python scripts/compress_images.py

      - name: Setup Node.js
        if: steps.self-heal.outputs.fixed != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Hugo site
        if: steps.self-heal.outputs.fixed != 'true'
        run: hugo --minify --gc

      - name: Generate Pagefind search index
        if: steps.self-heal.outputs.fixed != 'true'
        run: npx pagefind --site public

      - name: Validate schema
        if: steps.self-heal.outputs.fixed != 'true'
        run: python scripts/generate_schema.py

      - name: Upload Pages Artifact
        if: steps.self-heal.outputs.fixed != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Setup Pages
        if: steps.self-heal.outputs.fixed != 'true'
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.self-heal.outputs.fixed != 'true'
        id: deployment
        uses: actions/deploy-pages@v4
