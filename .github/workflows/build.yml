name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: koreawiki-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.163.1
  PYTHON_VERSION: "3.12"

jobs:
  self-heal:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      fixed: ${{ steps.fix.outputs.fixed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 10
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install lint dependency
        run: pip install pyyaml
      - name: Self-heal one safe round only
        id: fix
        run: |
          python3 scripts/markdown_lint.py --fix
          python3 scripts/slug.py
          if git diff --quiet; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          loops=$(git log -3 --format=%s | grep -c '^fix(self-heal):' || true)
          if [ "$loops" -ge 3 ]; then
            echo "Auto-fix stopped after three consecutive rounds." >&2
            exit 1
          fi
          git config user.name "koreawiki-self-heal[bot]"
          git config user.email "292648126+Banhang-Chogao@users.noreply.github.com"
          git add content
          git commit -m "fix(self-heal): normalize markdown and slugs"
          git push
          echo "fixed=true" >> "$GITHUB_OUTPUT"

  qa:
    needs: self-heal
    if: always() && (needs.self-heal.result == 'skipped' || needs.self-heal.outputs.fixed != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        run: pip install pyyaml pillow scikit-learn
      - name: Run pre-deploy gate
        run: python3 scripts/pre_deploy.py

  build:
    needs: qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        run: pip install pyyaml pillow scikit-learn
      - name: Build production site
        run: hugo --minify --gc --environment production
      - name: Build Pagefind index
        run: npx -y pagefind --site public --output-subdir pagefind
      - name: Run post-build SEO gate
        run: |
          python3 scripts/pre_deploy.py --postbuild
          python3 scripts/check_build_seo.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
