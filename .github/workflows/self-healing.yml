name: Self-Healing Recovery

# When Build & Deploy or QA fails, automatically enter recovery mode:
# download logs → scientist playbook fixes → validate → PR (no force deploy).

on:
  workflow_run:
    workflows: ["Build & Deploy", "QA"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed workflow run ID (optional; defaults to latest failed Build & Deploy)"
        required: false
        type: string
      round:
        description: "Recovery round number (1-5)"
        required: false
        default: "1"
        type: string

concurrency:
  group: self-healing
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write

env:
  HUGO_VERSION: 0.126.0
  PYTHON_VERSION: "3.12"
  MAX_ROUNDS: "5"

jobs:
  recover:
    name: Recover from CI failure
    runs-on: ubuntu-latest
    # Only on real failures (not self-healing workflow, not cancelled)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.name != 'Self-Healing Recovery')
    steps:
      - name: Resolve failed run metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const maxRounds = parseInt(process.env.MAX_ROUNDS || '5', 10);
            let runId = '${{ github.event.inputs.run_id || '' }}';
            let headSha = context.sha;
            let headBranch = context.ref.replace('refs/heads/', '');
            let round = parseInt('${{ github.event.inputs.round || '1' }}', 10) || 1;

            if (context.eventName === 'workflow_run') {
              runId = String(context.payload.workflow_run.id);
              headSha = context.payload.workflow_run.head_sha;
              headBranch = context.payload.workflow_run.head_branch || 'main';
              // Count recent self-heal commits on this branch for round number
              const commits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headBranch,
                per_page: 20,
              });
              let healCount = 0;
              for (const c of commits.data) {
                if (/\[self-heal\s+\d+\/\d+\]/i.test(c.commit.message)) healCount += 1;
                else break;
              }
              round = healCount + 1;
            } else if (!runId) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                status: 'completed',
                per_page: 15,
              });
              const failed = runs.data.workflow_runs.find(
                (r) => r.conclusion === 'failure' && r.name !== 'Self-Healing Recovery'
              );
              if (failed) {
                runId = String(failed.id);
                headSha = failed.head_sha;
                headBranch = failed.head_branch || 'main';
              }
            }

            if (round > maxRounds) {
              core.setFailed(`Max self-heal rounds (${maxRounds}) exceeded. Manual intervention required.`);
              return;
            }

            core.setOutput('run_id', runId || '');
            core.setOutput('head_sha', headSha);
            core.setOutput('head_branch', headBranch);
            core.setOutput('round', String(round));
            core.info(`Recovering run=${runId} sha=${headSha} branch=${headBranch} round=${round}`);

      - name: Checkout failing revision
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download failed workflow logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.meta.outputs.run_id }}
        run: |
          mkdir -p /tmp/failed-run-logs
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" -D /tmp/failed-run-logs 2>/dev/null || true
            gh run view "$RUN_ID" --log > /tmp/failed-run-logs/workflow.log 2>/dev/null || \
              gh run view "$RUN_ID" --log-failed > /tmp/failed-run-logs/workflow.log 2>/dev/null || \
              echo "Could not download logs for run $RUN_ID" > /tmp/failed-run-logs/workflow.log
          else
            echo "No run id — empty log (will run full hygiene suite)" > /tmp/failed-run-logs/workflow.log
          fi
          wc -l /tmp/failed-run-logs/workflow.log || true

      - name: Run self-healing recovery
        id: heal
        env:
          SELF_HEAL_RUN_ID: ${{ steps.meta.outputs.run_id }}
          SELF_HEAL_LOG: /tmp/failed-run-logs/workflow.log
        run: |
          set +e
          python3 scripts/self_healing.py recover \
            --log /tmp/failed-run-logs/workflow.log \
            --round "${{ steps.meta.outputs.round }}" \
            --run-id "${{ steps.meta.outputs.run_id }}"
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Locate newest report
          REPORT=$(ls -1dt reports/self-healing/*/ 2>/dev/null | head -1)
          echo "report_dir=$REPORT" >> "$GITHUB_OUTPUT"
          if [ -n "$REPORT" ] && [ -f "${REPORT}STATUS" ]; then
            echo "status=$(cat "${REPORT}STATUS")" >> "$GITHUB_OUTPUT"
          else
            echo "status=unknown" >> "$GITHUB_OUTPUT"
          fi
          # Copy raw log into report if present
          if [ -n "$REPORT" ] && [ -f /tmp/failed-run-logs/workflow.log ]; then
            cp /tmp/failed-run-logs/workflow.log "${REPORT}workflow.log" || true
          fi
          exit 0

      - name: Upload recovery report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-report-${{ steps.meta.outputs.run_id || 'manual' }}
          path: reports/self-healing/
          if-no-files-found: warn

      - name: Create recovery branch and PR (when patches exist)
        if: steps.heal.outputs.status == 'recovered' || steps.heal.outputs.exit_code == '0' || steps.heal.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUND: ${{ steps.meta.outputs.round }}
          RUN_ID: ${{ steps.meta.outputs.run_id }}
          STATUS: ${{ steps.heal.outputs.status }}
        run: |
          set -e
          git config user.name "korea-wiki-self-heal[bot]"
          git config user.email "292648126+Banhang-Chogao@users.noreply.github.com"

          # Detect changes
          if git diff --quiet && git diff --cached --quiet; then
            # include untracked reports
            if [ -z "$(git ls-files --others --exclude-standard reports/self-healing 2>/dev/null)" ]; then
              echo "No file changes from self-healing."
              if [ "$STATUS" != "recovered" ]; then
                # Open issue for manual fix
                if [ -n "$RUN_ID" ]; then
                  REPORT_FILE=$(ls -1t reports/self-healing/*/RECOVERY_REPORT.md 2>/dev/null | head -1 || true)
                  BODY="Self-healing could not auto-fix CI failure for run [$RUN_ID](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID).
          
          Round: $ROUND / $MAX_ROUNDS
          
          $( [ -n "$REPORT_FILE" ] && cat "$REPORT_FILE" | head -c 60000 )
          
          Do **not** force deploy while validations are red. Follow AGENTS.md + scientist.md."
                  gh issue create \
                    --title "self-heal: manual recovery needed (run $RUN_ID)" \
                    --body "$BODY" || true
                fi
              fi
              exit 0
            fi
          fi

          BRANCH="self-heal/run-${RUN_ID:-manual}-r${ROUND}"
          git checkout -B "$BRANCH"

          git add -A reports/self-healing scripts/self_healing.py scientist.md content themes layouts config data 2>/dev/null || true
          git add -A

          if git diff --cached --quiet; then
            echo "Nothing staged."
            exit 0
          fi

          if [ "$STATUS" = "recovered" ]; then
            MSG="fix(self-heal): auto-recover CI failure [self-heal ${ROUND}/${MAX_ROUNDS}]

          Triggered by failed workflow run ${RUN_ID:-unknown}.
          Validations green. Safe for review/merge — does not force deploy."
          else
            MSG="fix(self-heal): partial recovery report [self-heal ${ROUND}/${MAX_ROUNDS}]

          Triggered by failed workflow run ${RUN_ID:-unknown}.
          Some checks still red — do not force deploy."
          fi

          git commit -m "$MSG"

          git push -u origin "$BRANCH" --force-with-lease

          # Open or update PR
          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url' || true)
          BODY_FILE=$(mktemp)
          {
            echo "## Self-Healing Recovery"
            echo
            echo "- **Failed run:** [${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})"
            echo "- **Round:** ${ROUND} / ${MAX_ROUNDS}"
            echo "- **Status:** \`${STATUS}\`"
            echo "- **Protocol:** AGENTS.md + scientist.md"
            echo
            echo "### Safety"
            echo
            echo "- Never fabricates content"
            echo "- Does **not** force deployment while checks are red"
            echo "- After merge, Build & Deploy re-runs normally"
            echo
            REPORT_FILE=$(ls -1t reports/self-healing/*/RECOVERY_REPORT.md 2>/dev/null | head -1 || true)
            if [ -n "$REPORT_FILE" ]; then
              echo "### Recovery Report"
              echo
              head -c 50000 "$REPORT_FILE"
            fi
          } > "$BODY_FILE"

          if [ -z "$PR_URL" ]; then
            if [ "$STATUS" = "recovered" ]; then
              gh pr create --title "fix(self-heal): recover CI run ${RUN_ID}" \
                --body-file "$BODY_FILE" --base main --head "$BRANCH"
            else
              gh pr create --title "fix(self-heal): partial recovery for run ${RUN_ID}" \
                --body-file "$BODY_FILE" --base main --head "$BRANCH"
            fi
            PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url' || true)
          else
            gh pr edit "$PR_URL" --body-file "$BODY_FILE" || true
          fi

          echo "PR: $PR_URL"

          # Auto-merge only when fully recovered AND allowed by repo
          if [ "$STATUS" = "recovered" ] && [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --auto --squash || \
              gh pr merge "$PR_URL" --squash || \
              echo "Auto-merge not available — PR left for review."
          fi

      - name: Fail job if recovery incomplete
        if: steps.heal.outputs.status != 'recovered' && steps.heal.outputs.exit_code != '0'
        run: |
          echo "Self-healing did not reach green validations."
          echo "See reports/self-healing/ and AGENTS.md — do not force deploy."
          exit 1
