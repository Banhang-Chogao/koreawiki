name: QA

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: koreawiki-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.1"
          extended: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: pip install pyyaml pillow scikit-learn
      - name: Validate source content
        run: python3 scripts/pre_deploy.py
      - name: Build and validate generated output
        run: |
          hugo --minify --gc --environment production
          npx -y pagefind --site public --output-subdir pagefind
          python3 scripts/pre_deploy.py --postbuild
          python3 scripts/check_build_seo.py
