<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsPage }}Article{{ else }}WebSite{{ end }}",
  "@id": "{{ .Permalink }}#{{ if .IsPage }}article{{ else }}website{{ end }}",
  "url": "{{ .Permalink }}",
  "name": "{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}",
  {{ if not .IsPage }}
  "description": "{{ .Site.Params.description }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ "" | absURL }}?s={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  },
  {{ end }}
  {{ if .IsPage }}
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "wordCount": "{{ .WordCount }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Params.author | default .Site.Params.author }}"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  {{ end }}
  "publisher": {
    "@type": "Organization",
    "name": "KoreaWiki",
    "url": "{{ .Site.BaseURL }}"
  }
}
</script>
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "KoreaWiki",
  "url": "{{ .Permalink }}",
  "logo": "{{ "images/favicon.svg" | absURL }}",
  "description": "{{ .Site.Params.description }}",
  "sameAs": [
    "https://github.com/Banhang-Chogao/koreawiki"
  ]
}
</script>
{{ end }}
