<header class="site-header" role="banner">
  <div class="header-container">
    <div class="header-brand">
      <a href="{{ "" | relLangURL }}" class="header-logo" aria-label="KoreaWiki Home">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="currentColor"/>
          <text x="16" y="22" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">K</text>
        </svg>
        <span class="header-site-name">KoreaWiki</span>
      </a>
    </div>
    <nav class="header-nav" role="navigation" aria-label="Main navigation">
      <button class="header-nav-toggle" aria-label="{{ T "toggle_menu" | default "Toggle menu" }}" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="header-nav-list">
        {{ range .Site.Menus.main }}
        <li class="header-nav-item">
          <a href="{{ .URL | relLangURL }}" class="header-nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
    <div class="header-actions">
      <button class="header-action-btn search-toggle" aria-label="{{ T "search" | default "Search" }}" data-search-toggle title="{{ T "search" | default "Search" }} (Ctrl+K)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="header-action-btn theme-toggle" aria-label="{{ T "toggle_theme" | default "Toggle theme" }}" data-theme-toggle title="{{ T "toggle_theme" | default "Toggle theme" }}">
        <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      {{ if hugo.IsMultilingual }}
      <div class="lang-switcher">
        <button class="header-action-btn lang-toggle" aria-label="{{ T "switch_language" | default "Switch language" }}" title="{{ T "switch_language" | default "Switch language" }}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <ul class="lang-list">
          {{ range .Site.Home.AllTranslations }}
          <li><a href="{{ .RelPermalink }}" lang="{{ .Language.LanguageCode }}" hreflang="{{ .Language.LanguageCode }}">{{ .Language.LanguageName }}</a></li>
          {{ end }}
        </ul>
      </div>
      {{ end }}
    </div>
  </div>
</header>
