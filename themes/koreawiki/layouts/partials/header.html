<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="{{ "" | relLangURL }}" class="header-brand">KoreaWiki</a>
    <div class="header-center">
      <button class="header-nav-toggle" aria-label="{{ T "toggle_menu" | default "Toggle menu" }}" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="header-nav" role="navigation" aria-label="Main navigation">
        <ul class="header-nav-list">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL | relLangURL }}" class="header-nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
    <div class="header-actions">
      <button class="header-btn search-toggle" aria-label="{{ T "search" | default "Search" }}" data-search-toggle title="{{ T "search" | default "Search" }} (Ctrl+K)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="header-btn theme-toggle" aria-label="{{ T "toggle_theme" | default "Toggle theme" }}" data-theme-toggle title="{{ T "toggle_theme" | default "Toggle theme" }}">
        <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>
