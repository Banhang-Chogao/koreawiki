<nav class="prev-next-nav" aria-label="Previous and next articles">
  <div class="prev-next-container">
    <div class="prev-next-prev">
      {{ if .PrevInSection }}
      <a href="{{ .PrevInSection.RelPermalink }}" rel="prev">
        <span class="prev-next-label">{{ T "previous" | default "Previous" }}</span>
        <span class="prev-next-title">{{ .PrevInSection.Title }}</span>
      </a>
      {{ end }}
    </div>
    <div class="prev-next-next">
      {{ if .NextInSection }}
      <a href="{{ .NextInSection.RelPermalink }}" rel="next">
        <span class="prev-next-label">{{ T "next" | default "Next" }}</span>
        <span class="prev-next-title">{{ .NextInSection.Title }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</nav>
