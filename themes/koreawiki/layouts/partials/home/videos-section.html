{{ $videos := first 4 .Pages }}
{{ if $videos }}
<section style="margin-bottom:var(--space-10)">
  <h2 style="font-size:var(--fs-2xl);font-weight:800;margin-bottom:var(--space-6);display:flex;align-items:center;gap:var(--space-3)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    {{ T "videos" | default "Videos" }}
  </h2>
  <div class="grid-2">
    {{ range $videos }}
    <article class="card">
      <a href="{{ .RelPermalink }}" class="card-link">
        {{ if .Params.cover.image }}
        <img class="card-img" src="{{ .Params.cover.image | relURL }}" alt="{{ .Params.cover.alt | default .Title }}" loading="lazy" decoding="async">
        {{ end }}
        <div class="card-body">
          <h3 class="card-title">{{ .Title }}</h3>
          {{ if .Description }}
          <p class="card-desc">{{ .Description }}</p>
          {{ end }}
          <div class="card-meta">
            <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
          </div>
        </div>
      </a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
