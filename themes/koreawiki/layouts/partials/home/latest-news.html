{{ $latest := first 8 (after 10 .Pages) }}
{{ if $latest }}
<section style="margin-bottom:var(--space-10)">
  <h2 style="font-size:var(--fs-2xl);font-weight:800;margin-bottom:var(--space-6);display:flex;align-items:center;gap:var(--space-3)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>
    {{ T "latest_news" | default "Latest News" }}
  </h2>
  <div class="latest-grid">
    {{ range $latest }}
    <a href="{{ .RelPermalink }}" class="list-card">
      {{ if .Params.cover.image }}
      <img class="list-card-img" src="{{ .Params.cover.image }}" alt="{{ .Params.cover.alt | default .Title }}" loading="lazy" decoding="async">
      {{ end }}
      <div class="list-card-body">
        <h3 class="list-card-title">{{ .Title }}</h3>
        <div class="list-card-meta">
          <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
          {{ if $.Site.Params.readingTime }}
          <span>{{ .ReadingTime }}m</span>
          {{ end }}
        </div>
      </div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
