{{ $pages := .Pages }}
{{ $photos := first 9 $pages }}
{{ if $photos }}
<section style="margin-bottom:var(--space-10)">
  <h2 style="font-size:var(--fs-2xl);font-weight:800;margin-bottom:var(--space-6);display:flex;align-items:center;gap:var(--space-3)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    {{ T "photos" | default "Photos" }}
  </h2>
  <div class="photo-grid">
    {{ range $photos }}
    <a href="{{ .RelPermalink }}" class="photo-card">
      {{ if .Params.cover.image }}
      <img src="{{ .Params.cover.image }}" alt="{{ .Params.cover.alt | default .Title }}" loading="lazy" decoding="async">
      {{ end }}
      <div class="photo-overlay">
        <span class="photo-overlay-title">{{ .Title }}</span>
        <span class="photo-overlay-meta"><time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time></span>
      </div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
