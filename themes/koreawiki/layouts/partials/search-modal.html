<div class="search-overlay" data-search-overlay role="dialog" aria-modal="true" aria-label="{{ T "search" | default "Search" }}">
  <div class="search-modal">
    <div class="search-header">
      <div class="search-form" role="search">
        <svg class="search-form-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" class="search-input" placeholder="{{ T "search_placeholder" | default "Search articles..." }}" autocomplete="off" autocorrect="off" spellcheck="false">
        <button type="button" class="search-close" data-search-close aria-label="{{ T "close_search" | default "Close search" }}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="search-body" data-search-results>
      <div class="search-hint">
        <p>{{ T "search_hint" | default "Type at least 2 characters to search..." }}</p>
        <div class="search-shortcuts">
          <span><kbd>↑</kbd><kbd>↓</kbd> {{ T "navigate" | default "Navigate" }}</span>
          <span><kbd>Enter</kbd> {{ T "select" | default "Select" }}</span>
          <span><kbd>Esc</kbd> {{ T "close" | default "Close" }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
