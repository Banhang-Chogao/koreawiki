{{ $related := .Site.RegularPages.Related . | first 4 }}
{{ if $related }}
<section class="related">
  <div style="max-width:var(--max-w);margin:0 auto;padding:0 var(--space-4)">
    <h2 class="related-title">{{ T "related_articles" | default "Related Articles" }}</h2>
    <div class="related-grid">
      {{ range $related }}
      <a href="{{ .RelPermalink }}" class="related-card">
        {{ if .Params.cover.image }}
        <img class="related-card-img" src="{{ .Params.cover.image }}" alt="{{ .Params.cover.alt | default .Title }}" loading="lazy" decoding="async">
        {{ end }}
        <div class="related-card-body">
          <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
          <h3>{{ .Title }}</h3>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
