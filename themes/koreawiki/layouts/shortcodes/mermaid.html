<div class="mermaid">{{ .Inner | safeHTML }}</div>
{{ if not (.Page.Scratch.Get "mermaid") }}{{ .Page.Scratch.Set "mermaid" true }}<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script><script>document.addEventListener('DOMContentLoaded',function(){mermaid.initialize({startOnLoad:true,theme:'base',themeVariables:{primaryColor:'var(--color-primary)',primaryTextColor:'var(--color-text)',primaryBorderColor:'var(--color-border)',lineColor:'var(--color-text-secondary)',secondaryColor:'var(--color-bg-secondary)',tertiaryColor:'var(--color-bg-tertiary)'}});});</script>{{ end }}
